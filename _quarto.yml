project:
  type: website

website:
  title: "Data Analysis 2026"
  page-navigation: true # Wichtig für die Sidebar-Navigation

  # Die Sidebar links (ähnlich wie im Bild, aber für die Wochen)
  sidebar:
    style: "floating"
    collapse-level: 1
    contents:
      - section: "Überblick"
        contents:
          - href: index.qmd
            text: "Dashboard"
      - section: "Vorlesungen"
        contents:
          - href: woche1.qmd
            text: "Woche 1: Einführung"
          - href: woche2.qmd
            text: "Woche 2: Datenreinigung"

  # Die Header-Leiste (Navbar) - Hier kommt der Sprachschalter hin!
  navbar:
    background: "#fff"
    right:
      - text: "Python"
        id: lang-switch-python
      - text: "R"
        id: lang-switch-r

format:
  html:
    theme: 
      - cosmo
      - custom.scss
    toc: true
    fontsize: 0.95rem
    mainfont: "Open Sans"
    include-in-header: language-switch.html # Hier laden wir die externe Datei