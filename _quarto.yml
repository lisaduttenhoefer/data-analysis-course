project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!test_qmds/"

filters:
  - shinylive

website:
  title: "METHODS IN DATA ANALYSIS"
  site-url: "https://lisaduttenhoefer.github.io/data-analysis-course"
  
  sidebar:
    style: "floating"
    collapse-level: 1
    contents:
      - text: "WELCOME"
        href: index.qmd
      - section: "COURSE-CONTENTS"
        contents:
          - text: "Getting started"
            href: 0_markdown.qmd
          - text: "WEEK 1: Datatypes"
            href: 1_datentypen.qmd

  navbar:
    background: "#ffffff"
    right:
      - text: "PYTHON"
        href: "#"
      - text: "R"
        href: "#"

format:
  html:
    theme: 
      - cosmo
      - custom.scss
    embed-resources: false
    include-in-header:
      - language-switch.html
      - coi-header.html

execute:
  enabled: true
  freeze: auto
  cache: false