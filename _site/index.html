  document.addEventListener('DOMContentLoaded', function() {
    function applyFinalStyle() {
      // Wir suchen alle Links in der Navbar
      const links = document.querySelectorAll('.navbar-nav .nav-link');
      let pyBtn, rBtn;
  
      links.forEach(link => {
        if (link.textContent.trim() === 'PYTHON') pyBtn = link;
        if (link.textContent.trim() === 'R') rBtn = link;
      });
  
      if (!pyBtn || !rBtn) {
        setTimeout(applyFinalStyle, 200);
        return;
      }
  
      const darkGreen = "#1a4d1a";
  
      function updateView(lang) {
        document.querySelectorAll('.lang-python').forEach(el => el.style.display = (lang === 'python' ? 'block' : 'none'));
        document.querySelectorAll('.lang-r').forEach(el => el.style.display = (lang === 'r' ? 'block' : 'none'));
        
        // Style Python
        pyBtn.style.cssText = `background-color: ${lang === 'python' ? darkGreen : 'white'} !important; color: ${lang === 'python' ? 'white' : darkGreen} !important; border: 2px solid ${darkGreen} !important; border-radius: 50px !important; padding: 5px 20px !important; margin: 5px !important; font-weight: 800 !important;`;
        
        // Style R
        rBtn.style.cssText = `background-color: ${lang === 'r' ? darkGreen : 'white'} !important; color: ${lang === 'r' ? 'white' : darkGreen} !important; border: 2px solid ${darkGreen} !important; border-radius: 50px !important; padding: 5px 20px !important; margin: 5px !important; font-weight: 800 !important;`;
        
        localStorage.setItem('da_course_lang', lang);
      }
  
      pyBtn.addEventListener('click', (e) => { e.preventDefault(); updateView('python'); });
      rBtn.addEventListener('click', (e) => { e.preventDefault(); updateView('r'); });
  
      updateView(localStorage.getItem('da_course_lang') || 'python');
    }
    applyFinalStyle();
  });

  // Funktion zum Markieren einer Aufgabe als erledigt
  function markTaskDone(taskId) {
      localStorage.setItem('task_' + taskId, 'true');
      updateGlobalProgress();
  }

  // Berechnet den Gesamtfortschritt und aktualisiert den Balken
  function updateGlobalProgress() {
      const totalWeeks = 12; // Deine Anzahl an Wochen
      let doneCount = 0;
      
      for (let i = 1; i <= totalWeeks; i++) {
          if (localStorage.getItem('task_woche' + i) === 'true') {
              doneCount++;
          }
      }
      
      const percent = Math.round((doneCount / totalWeeks) * 100);
      const bar = document.getElementById('course-progress-bar');
      const text = document.getElementById('progress-text');
      
      if (bar && text) {
          bar.style.width = percent + '%';
          bar.innerText = percent + '%';
          text.innerText = doneCount + ' von ' + totalWeeks + ' Wochen bearbeitet';
      }
  }

  // Beim Laden der Seite den Balken initialisieren
  document.addEventListener('DOMContentLoaded', updateGlobalProgress);
  </script>

<script>
// Week definitions — href uses the final rendered filename Quarto produces
const WEEKS = [
  {
    n: 1,
    title:  "Week 1: Basic Data Structures",
    topics: "Syntax · Variables · Vectors · Matrices · Lists · Dataframes",
    href:   "1_datentypen.html",   // Quarto renders 1_datentypen.qmd → 1_datentypen.html
    chunkCount: 20,
    quizIds: ["w1_q_vectors","w1_q_matrices","w1_q_lists","w1_q_dataframes"]
  },
  { n:2,  title:"Week 2: Datatypes",            topics:"Factors · Discrete vs. Continuous · Type Coercion",    locked:true },
  { n:3,  title:"Week 3: Data Import & Export",  topics:"CSV · Excel · RData · Working Directory",              locked:true },
  { n:4,  title:"Week 4: Data Manipulation",     topics:"dplyr / pandas · filter · mutate · group_by",          locked:true },
  { n:5,  title:"Week 5: Visualisation I",       topics:"ggplot2 / matplotlib · Scatter · Histogram · Boxplot", locked:true },
  { n:6,  title:"Week 6: Visualisation II",      topics:"Heatmaps · PCA plots · Multi-panel figures",           locked:true },
  { n:7,  title:"Week 7: Statistics I",          topics:"Distributions · t-test · Wilcoxon · Normality",        locked:true },
  { n:8,  title:"Week 8: Statistics II",         topics:"ANOVA · Correlation · Multiple Testing",               locked:true },
  { n:9,  title:"Week 9: String & Regex",        topics:"grep · gsub · stringr · Regular Expressions",          locked:true },
  { n:10, title:"Week 10: Functions & Loops",    topics:"for · apply / map · Custom Functions",                 locked:true },
  { n:11, title:"Week 11: Bioinformatics I",     topics:"Bioconductor · GEO · DESeq2 basics",                   locked:true },
  { n:12, title:"Week 12: Bioinformatics II",    topics:"RNA-seq pipeline · Enrichment Analysis",               locked:true }
];

// Progress key convention (must match woche1.qmd exactly):
//   chunk_{lang}_w{n}_c{i}   e.g. chunk_r_w1_c3
//   quiz_{lang}_w{n}_q_{id}  e.g. quiz_py_w1_q_vectors

function getLang() {
  try { return localStorage.getItem('da_course_lang') || 'python'; } catch(e){ return 'python'; }
}

function getWeekProgress(week) {
  if (!week.chunkCount) return null;
  const lang  = getLang();
  const total = week.chunkCount + (week.quizIds ? week.quizIds.length : 0);
  let done = 0;
  for (let i = 1; i <= week.chunkCount; i++) {
    try { if (localStorage.getItem('chunk_' + lang + '_w' + week.n + '_c' + i) === 'true') done++; } catch(e){}
  }
  (week.quizIds||[]).forEach(id => {
    try { if (localStorage.getItem('quiz_' + lang + '_w' + week.n + '_' + id) === 'true') done++; } catch(e){}
  });
  return { done, total, pct: Math.round((done/total)*100) };
}

function statusLabel(p, locked) {
  if (locked)       return '🔒 Locked';
  if (!p)           return '📋 No exercises yet';
  if (p.pct===100)  return '✅ Completed';
  if (p.done > 0)   return '🔄 In progress — ' + p.done + '/' + p.total + ' done';
  return '⬜ Not started';
}

function render() {
  const grid = document.getElementById('week-cards-grid');
  grid.innerHTML = '';
  let totalAll = 0, doneAll = 0;

  WEEKS.forEach(week => {
    const p   = getWeekProgress(week);
    const pct = p ? p.pct : 0;
    if (p) { totalAll += p.total; doneAll += p.done; }

    const col  = document.createElement('div');
    col.className = 'g-col-12 g-col-sm-6 g-col-md-4';

    const card = document.createElement(week.locked ? 'div' : 'a');
    card.className = 'week-card p-4';
    if (!week.locked && week.href) {
      card.href = week.href;
      card.style.textDecoration = 'none';
    } else {
      card.style.opacity = '0.55';
      card.style.cursor  = 'default';
    }

    card.innerHTML =
      '<div class="week-card-title">'  + week.title  + '</div>' +
      '<div class="week-card-topics">' + week.topics + '</div>' +
      '<div class="week-card-status">' + statusLabel(p, week.locked) + '</div>' +
      (p
        ? '<div class="week-card-progress-bar-bg mt-2"><div class="week-card-progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div style="font-size:0.73rem;color:#6c757d;margin-top:4px;">' + pct + '% complete</div>'
        : '');

    col.appendChild(card);
    grid.appendChild(col);
  });

  // Global banner
  const gPct = totalAll > 0 ? Math.round((doneAll/totalAll)*100) : 0;
  const bar  = document.getElementById('global-progress-bar');
  bar.style.width = gPct + '%';
  bar.innerText   = gPct > 8 ? gPct + '%' : '';
  document.getElementById('gp-percent-badge').innerText = gPct + '%';
  const completedW = WEEKS.filter(w => { const p = getWeekProgress(w); return p && p.pct===100; }).length;
  const activeW    = WEEKS.filter(w => !w.locked && getWeekProgress(w) !== null).length;
  document.getElementById('gp-subtext').innerText =
    completedW + ' of ' + activeW + ' weeks fully completed · ' + getLang().toUpperCase() + ' mode';
}

document.addEventListener('DOMContentLoaded', () => {
  render();
  window.addEventListener('storage', render);
  // Re-render after a moment in case same-tab navigation just set keys
  setTimeout(render, 400);
  setTimeout(render, 1200);
});
</script>

      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
